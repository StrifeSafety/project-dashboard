<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layouts.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="logo"><div class="logo-dot"></div>Project Dashboard</div>
  <div id="workspaceSwitcher" style="position:relative;margin-left:16px"></div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="nav-right">
    <button class="btn btn-ghost btn-sm" id="themeToggleBtn" title="Toggle light/dark mode">🌙</button>
    <button class="btn btn-ghost btn-sm" id="exportBtn">↓ Export</button>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" style="color:var(--text3)">Sign Out</button>
    <button class="btn btn-primary btn-sm" id="newBtn">+ New</button>
  </div>
</nav>

<!-- SUB NAV -->
<div class="subnav" id="subnav"></div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>
  <!-- CONTENT AREA -->
  <div class="content" id="contentArea"></div>
</div>

<!-- MODALS -->
<div class="overlay" id="addModal"><div class="modal">
  <div class="modal-hd"><h2 class="modal-title" id="addModalTitle">New Task</h2><button class="modal-x" id="addModalClose">✕</button></div>
  <div id="addModalBody"></div>
</div></div>

<div class="overlay" id="detailModal"><div class="modal">
  <div class="modal-hd"><h2 class="modal-title" id="detailTitle"></h2><button class="modal-x" id="detailModalClose">✕</button></div>
  <div id="detailBody"></div>
  <div class="detail-actions" id="detailActions"></div>
</div></div>

<div class="toast" id="toast"></div>

<!-- EXPORT MODAL -->
<div class="overlay" id="exportModal"><div class="modal" style="max-width:560px">
  <div class="modal-hd"><h2 class="modal-title">↓ Export to Excel</h2><button class="modal-x" onclick="closeExportModal()">✕</button></div>
  <div id="exportModalBody" style="padding:20px 24px">

    <div style="margin-bottom:20px">
      <div class="fl" style="margin-bottom:10px">Project Filter</div>
      <select class="fs" id="exp-project" style="width:100%">
        <option value="">All Projects</option>
      </select>
    </div>

    <div style="margin-bottom:20px">
      <div class="fl" style="margin-bottom:10px">Sections to Include</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="exp-projects" checked style="accent-color:var(--accent)"/> Projects</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="exp-tasks" checked style="accent-color:var(--accent)"/> Tasks</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="exp-budgets" checked style="accent-color:var(--accent)"/> Budgets</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="exp-meetings" checked style="accent-color:var(--accent)"/> Meetings</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="exp-stakeholders" checked style="accent-color:var(--accent)"/> Stakeholders</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="exp-documents" checked style="accent-color:var(--accent)"/> Documents</label>
      </div>
    </div>

    <div id="exp-preview" style="margin-bottom:20px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);font-size:12px;color:var(--text3);min-height:40px"></div>

    <div class="modal-foot" style="padding:0">
      <button class="btn btn-ghost" onclick="closeExportModal()">Cancel</button>
      <button class="btn btn-primary" onclick="generateExport()">↓ Download Excel</button>
    </div>
  </div>
</div></div><div class="toast" id="toast"></div>

<!-- DELETE CONFIRMATION MODAL -->
<div class="overlay" id="deleteModal"><div class="modal" style="max-width:400px">
  <div class="modal-hd"><h2 class="modal-title" id="deleteModalTitle">Confirm Delete</h2><button class="modal-x" onclick="closeDeleteModal()">✕</button></div>
  <div style="padding:20px 24px">
    <p id="deleteModalMsg" style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6"></p>
    <div class="modal-foot" style="padding:0">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-primary" id="deleteModalConfirmBtn" style="background:var(--red);border-color:var(--red)">Delete</button>
    </div>
  </div>
</div></div>

<!-- CREATE WORKSPACE MODAL -->
<div class="overlay" id="createWorkspaceModal"><div class="modal" style="max-width:420px">
  <div class="modal-hd"><h2 class="modal-title">New Workspace</h2><button class="modal-x" onclick="document.getElementById('createWorkspaceModal').classList.remove('open')">✕</button></div>
  <div style="padding:20px 24px">
    <div class="fg"><label class="fl">Workspace Name</label><input class="fi" id="ws-name-input" placeholder="e.g. Acme Corp" /></div>
    <div class="modal-foot" style="padding:0;margin-top:8px">
      <button class="btn btn-ghost" onclick="document.getElementById('createWorkspaceModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreateWorkspace()">Create Workspace</button>
    </div>
  </div>
</div></div>
<!-- Sidebar toggle for mobile -->
<button class="sidebar-toggle" id="sidebarToggle">☰</button>

<script type="module" src="js/app.js"></script>
</body>
</html>
